<!DOCTYPE html>
<html lang="ru">

<title>ULTIMATE HOCKEY: ROAD TO DREAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ice:#0B1F3A; --ice-deep:#050d1a; --rink-line:#C8102E; --gold:#FFB81C;
    --gold-2:#FFD766; --steel:#8B96A5; --frost:#F5F7FA; --panel:#122A4D; --panel-2:#0F2440;
    --pos:#3DDC97; --neg:#FF6B6B; --electric:#00D4FF; --radius:12px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:
      radial-gradient(ellipse at 50% 0%, rgba(255,110,20,.35) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 90%, rgba(255,60,10,.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(255,150,0,.14) 0%, transparent 60%),
      linear-gradient(180deg,#1a0a05 0%, #0d0603 55%, #050302 100%);
    color:var(--frost); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden;}
  .fire-number{position:fixed; top:50%; left:50%; transform:translate(-50%,-55%); font-family:'Oswald',sans-serif;
    font-weight:800; font-size:min(70vw,520px); line-height:1; color:rgba(255,140,40,.07); z-index:0; pointer-events:none;
    user-select:none; letter-spacing:-10px;}
  .rink-lines{position:fixed; inset:0; pointer-events:none; opacity:.05; z-index:0;
    background:repeating-linear-gradient(0deg, transparent 0 78px, var(--frost) 78px 79px),
      repeating-linear-gradient(90deg, transparent 0 78px, var(--frost) 78px 79px);}
  .app{position:relative; z-index:1; max-width:820px; margin:0 auto; padding:20px 16px 60px;}
  header{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px;
    border-bottom:3px solid transparent; border-image:linear-gradient(90deg,var(--rink-line),var(--electric)) 1; padding-bottom:14px;}
  h1{font-family:'Oswald',sans-serif; font-weight:800; letter-spacing:1px; font-size:24px; margin:0; text-transform:uppercase;
    background:linear-gradient(90deg,var(--frost),var(--electric)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  h1 span{color:var(--gold); -webkit-text-fill-color:var(--gold);}
  .tagline{color:var(--steel); font-size:11px; margin-top:2px; letter-spacing:.5px; text-transform:uppercase;}
  .crest{width:40px; height:40px; border-radius:50%; background:radial-gradient(circle at 35% 30%, var(--electric), var(--ice) 70%);
    border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif;
    font-weight:800; font-size:14px; color:var(--frost); flex-shrink:0; box-shadow:0 0 12px rgba(0,212,255,.4);}
  .header-left{display:flex; align-items:center; gap:10px;}
  nav{display:flex; gap:4px; flex-wrap:wrap; margin-bottom:18px; background:rgba(0,0,0,.25); padding:5px; border-radius:14px;
    border:1px solid rgba(0,212,255,.1);}
  nav button{background:transparent; color:var(--steel); border:1px solid transparent; padding:9px 13px; border-radius:10px;
    font-family:'Oswald',sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:.4px; cursor:pointer; flex:1; min-width:80px;
    transition:.15s;}
  nav button.active{background:linear-gradient(155deg,var(--electric),#0077a3); color:var(--ice-deep); font-weight:700;
    box-shadow:0 0 14px rgba(0,212,255,.35);}
  nav button:hover:not(.active){color:var(--frost);}
  section{display:none;} section.active{display:block; animation:fade .2s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
  .card{background:linear-gradient(155deg, var(--panel), var(--panel-2)); border-radius:var(--radius); padding:16px 16px 16px 18px; margin-bottom:14px;
    border:1px solid rgba(0,212,255,.08); border-left:3px solid var(--electric); box-shadow:0 4px 20px rgba(0,0,0,.3); position:relative;}
  .card h2{font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:14px; letter-spacing:1px; margin:0 0 12px; color:var(--gold);
    display:flex; align-items:center; gap:6px;}
  .row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center;}
  input, select{background:var(--panel-2); border:1px solid rgba(255,255,255,.1); color:var(--frost); padding:9px 10px;
    border-radius:6px; font-family:'Inter',sans-serif; font-size:14px; flex:1; min-width:100px;}
  input:focus, select:focus{outline:2px solid var(--electric); border-color:transparent;}
  label.f{font-size:11px; color:var(--steel); display:block; margin-bottom:3px;}
  .field{display:flex; flex-direction:column; min-width:110px; flex:1;}
  button.primary{background:linear-gradient(135deg,var(--rink-line),#8f0a1c); color:#fff; border:none; padding:10px 20px; border-radius:8px;
    font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:13px; letter-spacing:.5px; cursor:pointer; font-weight:700;
    box-shadow:0 3px 12px rgba(200,16,30,.35);}
  button.primary:hover{filter:brightness(1.1);}
  button.ghost{background:transparent; border:1px solid var(--steel); color:var(--steel); padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer;}
  button.ghost:hover{border-color:var(--electric); color:var(--electric);}
  .icon-btn{background:none; border:none; color:var(--steel); cursor:pointer; font-size:16px; padding:2px 6px;}
  .icon-btn:hover{color:var(--rink-line);}
  .daybtn{background:var(--panel-2); border:1px solid var(--steel); color:var(--steel); border-radius:6px; padding:6px 9px; font-size:12px; cursor:pointer;}
  .daybtn.on{background:var(--gold); color:var(--ice-deep); border-color:var(--gold); font-weight:600;}
  .toggle{position:relative; display:inline-block; width:38px; height:22px; flex-shrink:0;}
  .toggle input{opacity:0; width:0; height:0;}
  .toggle .slider{position:absolute; inset:0; background:var(--panel-2); border:1px solid var(--steel); border-radius:999px; cursor:pointer; transition:.15s;}
  .toggle .slider::before{content:''; position:absolute; height:16px; width:16px; left:2px; top:2px; background:var(--steel); border-radius:50%; transition:.15s;}
  .toggle input:checked + .slider{background:var(--pos); border-color:var(--pos);}
  .toggle input:checked + .slider::before{transform:translateX(16px); background:var(--ice-deep);}
  ul.list{list-style:none; margin:0; padding:0;}
  ul.list li{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 4px; border-bottom:1px solid rgba(255,255,255,.06);}
  ul.list li:last-child{border-bottom:none;}
  .pill{display:inline-block; background:var(--panel-2); border:1px solid rgba(0,212,255,.15); border-radius:999px; padding:2px 9px; font-size:11px; color:var(--steel); margin-left:6px;}
  .empty{color:var(--steel); font-size:13px; padding:14px 0; text-align:center;}
  .muted{color:var(--steel); font-size:12px;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{text-align:left; font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:10.5px; letter-spacing:.5px;
    color:var(--electric); padding:9px 10px; border-bottom:2px solid rgba(0,212,255,.25); white-space:nowrap;}
  tbody td{padding:10px 10px; border-bottom:1px solid rgba(255,255,255,.07); vertical-align:middle;}
  tbody tr:nth-child(even){background:rgba(255,255,255,.025);}
  tbody tr:hover{background:rgba(0,212,255,.06);}
  .chart-wrap{overflow-x:auto; border-radius:8px;}

  /* Player card */
  .ovr-hero{display:flex; align-items:center; gap:18px; margin-bottom:16px; flex-wrap:wrap;}
  .ovr-badge{background:linear-gradient(155deg, var(--gold-2), var(--gold)); color:var(--ice-deep);
    font-family:'Oswald',sans-serif; font-weight:800; width:92px; height:100px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0;
    clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    box-shadow:0 0 22px rgba(255,184,28,.4); border:2px solid rgba(255,255,255,.3);}
  .ovr-badge .num{font-size:32px; line-height:1; text-shadow:0 1px 2px rgba(0,0,0,.2);}
  .ovr-badge .lbl{font-size:9px; letter-spacing:1.5px;}
  .player-name{font-family:'Oswald',sans-serif; font-size:24px; text-transform:uppercase; font-weight:800; letter-spacing:.5px;
    background:linear-gradient(90deg,var(--frost),var(--electric)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .attr-block{margin-bottom:14px;}

  /* 3-column game-menu layout (screenshot-style) */
  .game-grid{display:grid; grid-template-columns:1fr 1.3fr 1fr; gap:12px; margin-bottom:14px; align-items:start;}
  @media(max-width:720px){ .game-grid{grid-template-columns:1fr;} }
  .gg-col{display:flex; flex-direction:column; gap:12px;}
  .gg-box{background:linear-gradient(155deg, var(--panel), var(--panel-2)); border-radius:10px; padding:12px;
    border:1px solid rgba(0,212,255,.08); border-left:3px solid var(--electric); box-shadow:0 4px 16px rgba(0,0,0,.25);}
  .gg-box-title{font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:11px; letter-spacing:.8px; color:var(--gold); margin-bottom:8px;}
  .gg-line{display:flex; justify-content:space-between; font-size:12px; gap:8px;}
  .gg-center{position:relative; border-radius:14px; min-height:280px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:20px 12px; overflow:hidden;
    background:radial-gradient(ellipse at 50% 30%, rgba(255,140,40,.18), transparent 65%);}
  .gg-shield{width:110px; height:126px; clip-path:polygon(50% 0%,100% 22%,100% 100%,0% 100%,0% 22%);
    background:linear-gradient(155deg,rgba(255,255,255,.1),rgba(0,0,0,.35)); border:3px solid var(--gold);
    display:flex; align-items:center; justify-content:center;}
  .gg-shield-num{font-family:'Oswald',sans-serif; font-weight:800; font-size:44px;}
  .gg-tier-name{font-family:'Oswald',sans-serif; font-weight:700; font-size:14px; letter-spacing:1.5px; margin-top:8px;}

  /* Cinematic hero banner (career-mode menu style) */
  .hero-banner{position:relative; border-radius:var(--radius); overflow:hidden; margin-bottom:12px; padding:22px 18px;
    min-height:150px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    background:radial-gradient(ellipse at 30% 20%, rgba(0,212,255,.12), transparent 60%),
      radial-gradient(ellipse at 70% 100%, rgba(200,16,30,.15), transparent 60%),
      linear-gradient(155deg,#0a1f38,#050d1a);
    background-size:cover; background-position:center;
    border:1px solid rgba(0,212,255,.15); box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .hero-tier{width:78px; height:88px; flex-shrink:0; background:linear-gradient(155deg,rgba(255,255,255,.08),rgba(0,0,0,.3));
    border:2px solid var(--gold); border-radius:10px; clip-path:polygon(50% 0%,100% 20%,100% 100%,0% 100%,0% 20%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .hero-tier-num{font-family:'Oswald',sans-serif; font-weight:800; font-size:28px; line-height:1;}
  .hero-tier-name{font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:1px; color:var(--frost); margin-top:2px;}
  .hero-info{flex:1; min-width:160px;}
  .hero-photo-btn{display:inline-block; margin-top:8px; font-size:11px; color:var(--electric); border:1px solid var(--electric);
    border-radius:999px; padding:4px 12px; cursor:pointer;}
  .hero-photo-btn:hover{background:rgba(0,212,255,.1);}
  .stat-rail{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;}
  .stat-rail-item{background:var(--panel-2); border-radius:8px; padding:10px 6px; text-align:center; border:1px solid rgba(0,212,255,.08);}
  .sr-num{font-family:'Oswald',sans-serif; font-weight:800; font-size:18px; color:var(--gold);}
  .sr-lbl{font-size:9px; color:var(--steel); text-transform:uppercase; letter-spacing:.3px; margin-top:2px;}
  @media(max-width:480px){ .stat-rail{grid-template-columns:repeat(2,1fr);} }
  .attr-top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;}
  .attr-top .lbl{font-weight:600;}
  .attr-top .val{font-family:'Oswald',sans-serif; font-weight:700; color:var(--gold);}
  .bar-bg{background:var(--panel-2); border-radius:999px; height:10px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg, var(--rink-line), var(--gold)); border-radius:999px; transition:width .4s;}
  .xp-bg{background:var(--panel-2); border-radius:999px; height:4px; overflow:hidden; margin-top:3px;}
  .xp-fill{height:100%; background:var(--pos); border-radius:999px; transition:width .4s;}
  .goal-box{background:var(--panel-2); border:1px dashed var(--gold); border-radius:8px; padding:10px 12px; font-size:13px;}
  .goal-box b{color:var(--gold);}
  .history-chart{overflow-x:auto;}

  /* Tasks / progress */
  .progress-wrap{margin-bottom:14px;}
  .progress-label{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;}
  .milestone-list{margin-top:10px; font-size:12px;}
  .milestone-list .m-item{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.06);}
  .m-item.done{color:var(--pos);}
  .week-grid{display:grid; grid-template-columns:120px repeat(7,1fr); gap:0; font-size:11px; align-items:stretch;
    border:1px solid rgba(255,255,255,.12); border-radius:8px; overflow:hidden;}
  .week-grid > div{border-right:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08); padding:4px; display:flex; align-items:center; justify-content:center;}
  .week-grid > div:nth-child(8n){border-right:none;}
  .week-grid .hcell{text-align:center; color:var(--steel); font-family:'Oswald',sans-serif; text-transform:uppercase; padding:6px 0;
    background:rgba(255,255,255,.03); font-weight:600;}
  .week-grid .taskname{font-size:12px; padding:4px 6px; justify-content:flex-start; text-align:left; background:rgba(255,255,255,.02);}
  .week-grid .today-col{background:rgba(0,212,255,.1);}
  .week-grid .hcell.today-col{background:rgba(0,212,255,.25); color:var(--electric); font-weight:800;}
  .chk{width:26px; height:26px; margin:0 auto; border-radius:6px; background:var(--panel-2); border:1px solid var(--steel);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px;}
  .chk.on{background:var(--pos); border-color:var(--pos); color:var(--ice-deep); font-weight:700;}
  @media(max-width:600px){
    .week-grid{grid-template-columns:90px repeat(7,1fr); font-size:10px;}
    .chk{width:22px; height:22px;}
  }
  .savebar{position:fixed; bottom:14px; right:14px; font-size:11px; color:var(--steel); background:var(--panel); padding:6px 12px; border-radius:999px; opacity:0; transition:opacity .3s; z-index:5;}
  .savebar.show{opacity:1;}
  fieldset{border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:10px; margin-bottom:10px;}
  legend{font-family:'Oswald',sans-serif; font-size:12px; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; padding:0 6px;}

  .line-tabs{display:flex; gap:4px; margin-bottom:12px; background:rgba(0,0,0,.25); border-radius:10px; padding:4px;}
  .line-tab{flex:1; background:transparent; border:none; color:var(--steel); padding:8px 6px; border-radius:8px;
    font-family:'Oswald',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.3px; cursor:pointer;}
  .line-tab.active{background:linear-gradient(155deg,var(--electric),#0077a3); color:var(--ice-deep); font-weight:700;}
  .halfrink{position:relative; width:100%; padding-top:105%; border-radius:16px; overflow:hidden;
    background:linear-gradient(180deg,#0d3a5c,#0a2d47);
    border:2px solid var(--electric); box-shadow:0 0 30px rgba(0,212,255,.12) inset;}
  .halfrink-crease{position:absolute; top:0; left:50%; width:34%; height:16%; transform:translateX(-50%);
    border:2px solid rgba(255,255,255,.35); border-top:none; border-radius:0 0 50% 50%; background:rgba(255,255,255,.04);}
  .halfrink-circle{position:absolute; top:22%; width:15%; padding-top:15%; transform:translate(-50%,0);
    border:2px solid rgba(255,255,255,.18); border-radius:50%;}
  .rink-slot{position:absolute; transform:translate(-50%,-50%); background:rgba(255,255,255,.08); border:1px dashed var(--steel);
    border-radius:10px; padding:6px 8px; min-width:64px; text-align:center; cursor:pointer;}
  .rink-slot.filled{background:linear-gradient(155deg,var(--gold-2),var(--gold)); border:1px solid var(--gold); color:var(--ice-deep);}
  .rink-slot-pos{font-size:9px; opacity:.7; font-family:'Oswald',sans-serif;}
  .rink-slot-name{font-size:11px; font-weight:600; margin-top:2px; word-break:break-word;}
</style>
</head>

const SHOT_CONVERSION_PENALTY = 1.2; // per shot on target that did NOT become a goal. Must outweigh the +0.8 accuracy credit + 0.15 volume credit, or "shoots a lot, scores nothing" keeps net-rewarding him — that was the exact bug reported and fixed here.

// Single-match rating (Flashscore-style) — fast per-game signal, separate from
// the slow attribute XP. base + scaled sum of this game's total XP across attrs.
const MATCH_RATING_BASE = 6.0;
const MATCH_RATING_SCALE = 0.15;
// Hot-streak bonus: every N consecutive played (non-missed) games rated >= threshold
// grants a one-off XP bonus to every attribute.
const HOT_STREAK_LEN = 3;

  if(n>=2) return 30;

}

// Live sync: instead of reading once at page load, we keep a standing connection.
// Any change from either phone arrives here within roughly a second, so the in-memory
// `data` never goes stale long enough for a save from the other device to erase it.
let isFirstSnapshot = true;
function initLiveSync(){
  return new Promise((resolve)=>{
    onSnapshot(appDocRef, (snap)=>{
      if(snap.metadata.hasPendingWrites) return; // echo of our own not-yet-confirmed write — nothing new to apply
      if(snap.exists() && snap.data().json){
        data = Object.assign(defaultData(), JSON.parse(snap.data().json));
      }
      if(isFirstSnapshot){
        isFirstSnapshot = false;
        if(!data.weeklyPrograms || Object.keys(data.weeklyPrograms).length===0){
          // migrate the old always-recurring task list into "this week"'s program, once
          data.weeklyPrograms[mondayStr(todayStr())] = (data.tasks||[]).map(t=>({
            id:t.id, name:t.name, points:t.points, attr:t.attr, skillXp:t.skillXp, days:t.days, confirmRequired:t.confirmRequired
          }));
        }
        if(!data.fixedStaleShootingXp){
          // one-time cleanup of leftover XP from an early build's weaker conversion-penalty bug
          data.player.attributes.shooting.xp = 0;
          data.fixedStaleShootingXp = true;
        }
        if(settleWeeks()) saveData();
        renderAll();
        resolve();
      } else {
        renderAll();
      }
    }, (err)=>{
      console.error('live sync error', err);
      alert('Потеряна связь с Firebase — проверь интернет-соединение. Изменения не будут сохраняться, пока связь не восстановится.');
      resolve();
    });
  });
}
async function loadData(){
  await initLiveSync();
}
let saveTimer=null;
async function saveData(){
  try{
    await setDoc(appDocRef, { json: JSON.stringify(data), updatedAt: Date.now() });
    const bar=document.getElementById('savebar');
    bar.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>bar.classList.remove('show'), 900);
  }catch(e){ console.error('save failed', e); alert('Не удалось сохранить — проверь интернет-соединение, изменения могут потеряться.'); }
}


// ================= HELPERS =================
function monthKey(d){ return d.slice(0,7); } // 'YYYY-MM' from 'YYYY-MM-DD'
function todayStr(){ return new Date().toISOString().slice(0,10); }
function mondayOf(date){
  const d = new Date(date);
  const idx = (d.getDay()+6)%7; // 0=Monday
  d.setDate(d.getDate()-idx);
  return d;
}
const DAY_LABELS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function addDays(dateStr, n){
  const d = new Date(dateStr); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function weekdayIndex(dateStr){ return (new Date(dateStr).getDay()+6)%7; } // 0=Monday

function mondayStr(dateStr){ return mondayOf(dateStr).toISOString().slice(0,10); }

function programForWeek(mondayDateStr){ return data.weeklyPrograms[mondayDateStr] || []; }

// Tasks that exist for a given date: whatever was explicitly added to THAT week's
// program, matching that weekday. Nothing recurs automatically week to week.
function tasksForDate(dateStr){
  const weekday = weekdayIndex(dateStr);
  return programForWeek(mondayStr(dateStr)).filter(t=>t.days.includes(weekday));
}

// Walks forward week-by-week (Mon-Sun) from the last settled week up to (not including)
// the current week, checking whether every scheduled task-day that week was fully done.
// Idempotent — safe to call on every load. Bonus goes to the rewards ledger, never to skill XP.
function settleWeeks(){
  const h = data.habit;
  const thisMonday = mondayStr(todayStr());
  if(!h.lastSettledWeekMonday){ h.lastSettledWeekMonday = thisMonday; return false; } // first run ever — nothing to evaluate yet
  let cursor = h.lastSettledWeekMonday;
  let changed = false;
  while(cursor < thisMonday){
    changed = true;
    const weekDates = Array.from({length:7}, (_,i)=>addDays(cursor, i));
    let perfect = true;
    weekDates.forEach(d=>{
      const scheduled = tasksForDate(d);
      if(scheduled.length===0) return; // no tasks that day — neutral, doesn't break the week
      const closed = scheduled.every(t=> data.taskLog[d] && data.taskLog[d][t.id] && data.taskLog[d][t.id].status==='done');
      if(!closed) perfect = false;
    });
    if(perfect){
      h.perfectWeeks++;
      const bonus = weeklyBonusForStreak(h.perfectWeeks);
      data.bonusLedger.push({date: cursor, points: bonus, reason:`Идеальная неделя №${h.perfectWeeks} подряд`});
    } else {
      h.perfectWeeks = 0;
    }
    cursor = addDays(cursor, 7);
  }
  h.lastSettledWeekMonday = thisMonday;
  return changed;
}

  successfulDekes:'Успешные обводки', failedDekes:'Неудачные обводки',

  lateReturns:'Не успел вернуться в оборону', plusMinus:'+/- на льду', chancesCreated:'Явные моменты созданы',
  duelsWon:'Единоборства выиграно', duelsLost:'Единоборства проиграно', takeaways:'Отборы', penalties:'Штрафы'
};

function computeAttrSubAverages(attrKey, lastN=5){
  if(!XP_WEIGHTS[attrKey]) return null; // e.g. fitness — grows from training log, not match raw stats
  const recent = data.games.filter(g=>!g.missed).slice(-lastN);
  const fields = Object.keys(XP_WEIGHTS[attrKey]);
  if(recent.length===0) return fields.map(f=>({field:f, avg:null}));
  return fields.map(f=>{
    const sum = recent.reduce((s,g)=> s + (g.raw[f]||0), 0);
    return {field:f, avg: sum/recent.length};
  });
}

function computeTaskContributions(attrKey){
  const allTasks = Object.values(data.weeklyPrograms).flat().filter(t=>t.attr===attrKey);
  const byName = new Map(); // group by normalized name — the same recurring task gets a fresh id every week, name is what actually identifies it to a person
  allTasks.forEach(t=>{
    const key = t.name.trim().toLowerCase();
    if(!byName.has(key)) byName.set(key, {name:t.name.trim(), count:0, totalXp:0});
    const agg = byName.get(key);
    const xpEach = t.skillXp ?? TASK_XP;
    Object.values(data.taskLog).forEach(entries=>{
      if(entries[t.id] && entries[t.id].status==='done'){ agg.count++; agg.totalXp += xpEach; }
    });
  });
  return [...byName.values()];
}

function computeTrainingContributions(attrKey){
  return data.trainingTasks.filter(t=>t.attr===attrKey).map(t=>{
    let count=0;
    Object.values(data.trainingLog).forEach(marks=>{ if(marks[t.id]) count += marks[t.id]; });
    return {name:t.name, count, xpEach:TRAINING_XP_PER_MARK, totalXp:count*TRAINING_XP_PER_MARK};
  });
}

function getTier(ovrValue){
  if(ovrValue>=85) return {name:'СУПЕРНОВА', color:'#B24BF3'};
  if(ovrValue>=75) return {name:'ПЛАТИНА', color:'#7FE0E0'};
  if(ovrValue>=65) return {name:'ЗОЛОТО', color:'#FFB81C'};
  if(ovrValue>=50) return {name:'СЕРЕБРО', color:'#C0C6CC'};
  return {name:'БРОНЗА', color:'#C87F3D'};
}

function ovr(){
  const vals = Object.values(data.player.attributes).map(a=>a.rating);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}

function applyXp(attrKey, xpDelta){
  const a = data.player.attributes[attrKey];
  a.xp += xpDelta;
  while(a.xp >= LEVEL_XP && a.rating < 99){ a.rating++; a.xp -= LEVEL_XP; }
  while(a.xp < 0){
    if(a.rating > 20){ a.rating--; a.xp += LEVEL_XP; }
    else { a.xp = 0; break; }
  }
}

          <div class="row" style="margin:0; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05);">

}

function renderOvrHistory(){
  const wrap = document.getElementById('ovr-history');
  const entries = Object.entries(data.player.ovrHistory).sort((a,b)=>a[0].localeCompare(b[0]));
  if(entries.length===0){ wrap.innerHTML = '<p class="empty">Пока нет данных — внеси первую игру.</p>'; return; }
  const maxOvr = Math.max(...entries.map(e=>e[1]), 99);
  const minOvr = Math.min(...entries.map(e=>e[1]), 40);
  const W = Math.max(320, entries.length*70), H=130, pad=26;
  const bars = entries.map(([m,v],i)=>{
    const bw = (W-2*pad)/entries.length*0.6;
    const x = pad + i*((W-2*pad)/entries.length) + ((W-2*pad)/entries.length-bw)/2;
    const hgt = (v-minOvr)/(maxOvr-minOvr+1)*(H-2*pad-20)+8;
    const y = H-pad-hgt;
    const [yy,mm] = m.split('-');
    const monthName = new Date(yy+'-'+mm+'-01').toLocaleDateString('ru-RU',{month:'short'});
    return `<rect x="${x}" y="${y}" width="${bw}" height="${hgt}" fill="#FFB81C" rx="3"/>
      <text x="${x+bw/2}" y="${y-6}" fill="#F5F7FA" font-size="12" text-anchor="middle" font-family="Oswald">${v}</text>
      <text x="${x+bw/2}" y="${H-pad+14}" fill="#8B96A5" font-size="10" text-anchor="middle">${monthName}</text>`;
  }).join('');
  wrap.innerHTML = `<div class="history-chart"><svg width="${W}" height="${H+10}" viewBox="0 0 ${W} ${H+10}">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#8B96A5" stroke-width="1"/>
    ${bars}
  </svg></div>`;
}

function renderSeasonSummary(){
  const wrap = document.getElementById('season-summary');
  const played = data.games.filter(g=>!g.missed);
  const missedCount = data.games.filter(g=>g.missed).length;
  if(played.length===0){ wrap.innerHTML = '<p class="empty">Пока нет сыгранных игр.</p>'; return; }

  const avgRating = played.reduce((s,g)=>s+g.matchRating,0)/played.length;
  const half = Math.ceil(played.length/2);
  const firstHalf = played.slice(0, half), secondHalf = played.slice(half);
  const avg = arr => arr.length ? arr.reduce((s,g)=>s+g.matchRating,0)/arr.length : null;
  const firstAvg = avg(firstHalf), secondAvg = avg(secondHalf);

  const duelsWonTotal = played.reduce((s,g)=>s+(g.raw.duelsWon||0),0);
  const duelsLostTotal = played.reduce((s,g)=>s+(g.raw.duelsLost||0),0);
  const duelsWinPct = duelsWonTotal+duelsLostTotal>0 ? (duelsWonTotal/(duelsWonTotal+duelsLostTotal)*100) : null;

  const attrs = Object.entries(data.player.attributes);
  const lagging = attrs.reduce((min,[k,a])=> (!min || a.rating<min[1].rating) ? [k,a] : min, null);

  wrap.innerHTML = `
    <div class="row"><span class="muted" style="flex:2;">Сыграно / пропущено (травма·болезнь)</span><b>${played.length} / ${missedCount}</b></div>
    <div class="row"><span class="muted" style="flex:2;">Средняя оценка за матч (сезон)</span><b>${avgRating.toFixed(1)}</b></div>
    <div class="row"><span class="muted" style="flex:2;">Средняя оценка: 1-я половина сезона → 2-я</span><b>${firstAvg?firstAvg.toFixed(1):'—'} → ${secondAvg?secondAvg.toFixed(1):'—'}</b></div>
    <div class="row"><span class="muted" style="flex:2;">% выигранных единоборств за сезон</span><b>${duelsWinPct!==null?duelsWinPct.toFixed(0)+'%':'—'}</b></div>
    <div class="row"><span class="muted" style="flex:2;">Самый отстающий навык сейчас</span><b>${icon(lagging[0])} ${ATTR_DEFS[lagging[0]].label} (${lagging[1].rating})</b></div>
  `;
}

      ${getRosterNames().length>0 ? `

        <div id="scoresheet-list"></div>
        <div class="row" style="align-items:center; margin-top:6px;">
          <select id="sh-player" style="flex:2;">${getRosterNames().map(n=>`<option value="${n}">${n}</option>`).join('')}</select>
          <select id="sh-action" style="flex:1;">
            <option value="goals">Гол</option>
            <option value="assists">Передача</option>
            <option value="plusMinusPlus">+</option>
            <option value="plusMinusMinus">−</option>
            <option value="penalties">Штраф</option>
          </select>
          <input id="sh-count" type="number" min="1" value="1" style="max-width:70px;">
          <button class="ghost" id="sh-add" type="button">+ Добавить</button>

      </fieldset>` : `<p class="muted stat-fieldset">Добавь состав в «Моей команде», чтобы отмечать статы одноклубников.</p>`}

      const f = document.getElementById('f-'+k);
      if(f) f.value = v;
    });
    const cancelBtn = document.getElementById('cancel-edit');
    if(cancelBtn) cancelBtn.onclick = ()=>{ editingGameId = null; renderGame(); };
  } else {
    document.getElementById('g-date').valueAsDate = new Date();
  }
  document.getElementById('g-missed').onchange = (e)=>{
    document.querySelectorAll('.stat-fieldset').forEach(f=> f.style.display = e.target.checked ? 'none' : '');
  };

  const ACTION_LABELS = {goals:'Гол', assists:'Передача', plusMinusPlus:'+', plusMinusMinus:'−', penalties:'Штраф'};
  let sheetEntries = editGame && editGame.scoresheet ? editGame.scoresheet.flatMap(([name,s])=>{
    const entries = [];
    if(s.goals) entries.push({name, action:'goals', count:s.goals});
    if(s.assists) entries.push({name, action:'assists', count:s.assists});
    if(s.plusMinus>0) entries.push({name, action:'plusMinusPlus', count:s.plusMinus});
    if(s.plusMinus<0) entries.push({name, action:'plusMinusMinus', count:-s.plusMinus});
    if(s.penalties) entries.push({name, action:'penalties', count:s.penalties});
    return entries;
  }) : []; // {name, action, count}
  const sheetListEl = document.getElementById('scoresheet-list');
  function renderSheetList(){
    if(!sheetListEl) return;
    if(sheetEntries.length===0){ sheetListEl.innerHTML = '<p class="empty">Пока ничего не добавлено</p>'; return; }
    sheetListEl.innerHTML = '<ul class="list">' + sheetEntries.map((e,i)=>`
      <li><span>${e.name} — ${ACTION_LABELS[e.action]} ×${e.count}</span><button class="icon-btn" data-sh-remove="${i}">✕</button></li>
    `).join('') + '</ul>';
    sheetListEl.querySelectorAll('[data-sh-remove]').forEach(b=>b.onclick=()=>{
      sheetEntries.splice(parseInt(b.dataset.shRemove), 1);
      renderSheetList();
    });
  }
  renderSheetList();
  const shAddBtn = document.getElementById('sh-add');
  if(shAddBtn) shAddBtn.onclick = ()=>{
    const name = document.getElementById('sh-player').value;
    const action = document.getElementById('sh-action').value;
    const count = parseInt(document.getElementById('sh-count').value)||1;
    sheetEntries.push({name, action, count});
    renderSheetList();
  };
  function buildScoresheetFromEntries(){
    const agg = {};
    sheetEntries.forEach(e=>{
      if(!agg[e.name]) agg[e.name] = {goals:0, assists:0, plusMinus:0, penalties:0};
      if(e.action==='plusMinusPlus') agg[e.name].plusMinus += e.count;
      else if(e.action==='plusMinusMinus') agg[e.name].plusMinus -= e.count;
      else agg[e.name][e.action] += e.count;
    });
    return agg;
  }

  document.getElementById('save-game').onclick = ()=>{
    const date = document.getElementById('g-date').value || todayStr();
    const opponent = document.getElementById('g-opp').value.trim() || '—';
    const matchType = document.getElementById('g-type').value;
    const missed = document.getElementById('g-missed').checked;

    if(missed){
      data.games.push({id:uid(), date, opponent, matchType, missed:true, raw:null, xpGained:null, matchRating:null, ovrAfter: ovr(), scoresheet:[]});
      data.games.sort((a,b)=> new Date(a.date)-new Date(b.date));
      saveData(); renderPlayer(); renderGame();
      alert('Игра отмечена как пропущенная — рейтинги не изменились.');
      return;
    }

    const raw = {};
    ['racesWon','racesLost','beatenOnSpeed','successfulDekes','failedDekes','goals','shotsOnTarget','shotsTotal',
     'assists','turnovers','decisions','lateReturns','plusMinus','chancesCreated',
     'duelsWon','duelsLost','takeaways','penalties'].forEach(k=>{
      raw[k] = parseFloat(document.getElementById('f-'+k).value)||0;
    });

    const xpGained = {};
    Object.entries(XP_WEIGHTS).forEach(([attrKey, fields])=>{
      let xp = 0;
      Object.entries(fields).forEach(([fieldKey, weight])=>{
        const v = raw[fieldKey];
        xp += SUBJECTIVE_FIELDS.has(fieldKey) ? (v-5)*weight : v*weight;
      });
      xpGained[attrKey] = xp;
    });

    // Derived penalty: shots on target that did NOT become a goal — the honest fix
    // for "shoots a lot, never scores" without inventing a fake xG input field.
    const unconverted = Math.max(0, raw.shotsOnTarget - raw.goals);
    const conversionPenalty = -unconverted * SHOT_CONVERSION_PENALTY;
    xpGained.shooting += conversionPenalty;

    let editedGame = null;
    if(editingGameId){
      editedGame = data.games.find(g=>g.id===editingGameId);
      if(editedGame && !editedGame.missed && editedGame.xpGained){
        // reverse the old effects before applying the new ones
        Object.entries(editedGame.xpGained).forEach(([attr,xp])=> applyXp(attr, -xp));
        if(editedGame.hotStreakBonusAwarded) Object.keys(data.player.attributes).forEach(k=>applyXp(k, -HOT_STREAK_BONUS));
      }
    }
    Object.entries(xpGained).forEach(([attr,xp])=> applyXp(attr, xp));

    const totalXp = Object.values(xpGained).reduce((s,v)=>s+v,0);
    const matchRating = Math.max(1, Math.min(10, MATCH_RATING_BASE + totalXp*MATCH_RATING_SCALE));

    recordOvrSnapshot(date);
    const scoresheetEntry = Object.entries(buildScoresheetFromEntries());

    // hot-streak bonus: every HOT_STREAK_LEN consecutive played games rated >= threshold
    // (computed against the games list as it will look AFTER this save)
    const futureGames = editedGame
      ? data.games.map(g=> g.id===editingGameId ? {...g, missed:false, matchRating} : g)
      : [...data.games, {missed:false, matchRating}];
    const played = futureGames.filter(g=>!g.missed);
    let streakLen = 0;
    for(let i=played.length-1; i>=0; i--){
      if(played[i].matchRating >= HOT_STREAK_THRESHOLD) streakLen++; else break;
    }
    let bonusMsg = '', hotStreakBonusAwarded = false;
    if(streakLen>0 && streakLen % HOT_STREAK_LEN === 0){
      Object.keys(data.player.attributes).forEach(k=>applyXp(k, HOT_STREAK_BONUS));
      bonusMsg = `\n🔥 Серия из ${streakLen} игр с оценкой ≥${HOT_STREAK_THRESHOLD} — бонус +${HOT_STREAK_BONUS} XP во все навыки!`;
      hotStreakBonusAwarded = true;
    }

    if(editedGame){
      Object.assign(editedGame, {date, opponent, matchType, missed:false, raw, xpGained, matchRating, ovrAfter: ovr(), scoresheet: scoresheetEntry, hotStreakBonusAwarded});
    } else {
      data.games.push({id:uid(), date, opponent, matchType, missed:false, raw, xpGained, matchRating, ovrAfter: ovr(), scoresheet: scoresheetEntry, hotStreakBonusAwarded});
    }
    data.games.sort((a,b)=> new Date(a.date)-new Date(b.date));
    editingGameId = null;

    saveData();
    renderPlayer();
    renderGame();
    alert(`Игра сохранена. Оценка за матч: ${matchRating.toFixed(1)}.${bonusMsg}`);
  };
  renderGameHistory();
}

function renderGameHistory(){
  const wrap = document.getElementById('game-history');
  if(data.games.length===0){ wrap.innerHTML=''; return; }
  const rows = [...data.games].reverse().slice(0,5).map(g=>{
    if(g.missed){
      return `<li><span>${g.date} · ${g.opponent}<br><span class="muted">🩹 пропущено — травма/болезнь</span></span><span class="pill">не считается</span></li>`;
    }
    const chips = Object.entries(g.xpGained).map(([k,v])=>{
      const sign = v>=0?'+':'';
      const color = v>=0 ? 'var(--pos)' : 'var(--neg)';
      return `<span class="pill" style="color:${color}">${icon(k)} ${sign}${v.toFixed(1)}</span>`;
    }).join(' ');
    const sheet = (g.scoresheet||[]).map(([n,s])=>`${n}: ${s.goals}Г ${s.assists}П ${s.plusMinus>=0?'+':''}${s.plusMinus} ${s.penalties}Штр`).join(', ');
    return `<li><span>${g.date} · ${g.opponent}<br><span class="muted">${chips}</span>${sheet?`<br><span class="muted">${sheet}</span>`:''}</span><span class="pill">Оценка ${g.matchRating.toFixed(1)}</span></li>`;
  }).join('');
  wrap.innerHTML = `<div class="card"><h2>Последние 5 игр</h2><ul class="list">${rows}</ul><p class="muted" style="margin-top:8px;">Полная статистика и редактирование — во вкладке «Матчи».</p></div>`;
}

    {key:'date', label:'Дата'}, {key:'opponent', label:'Соперник'}, {key:'matchType', label:'Тип'}, {key:'matchRating', label:'Оценка'},
    {key:'skating', label:icon('skating')+' Катание'}, {key:'dribbling', label:icon('dribbling')+' Дриблинг'}, {key:'shooting', label:icon('shooting')+' Бросок'},
    {key:'iq', label:icon('iq')+' Интеллект'}, {key:'battle', label:icon('battle')+' Борьба'},
  ];
  function valueFor(g, key){
    if(key==='date') return g.date;
    if(key==='opponent') return g.opponent;
    if(key==='matchType') return g.matchType==='friendly' ? 'Товарищеская' : 'Официальная';
    if(key==='matchRating') return g.missed ? -Infinity : g.matchRating;
    return g.missed ? -Infinity : (g.xpGained[key]||0);
  }
  const sorted = [...data.games].sort((a,b)=>{
    const va = valueFor(a, matchesSortState.key), vb = valueFor(b, matchesSortState.key);
    const cmp = typeof va==='string' ? va.localeCompare(vb) : (va-vb);
    return matchesSortState.dir==='asc' ? cmp : -cmp;
  });
  el.innerHTML = `
    <div class="card">
      <h2>Все матчи (${data.games.length})</h2>
      <p class="muted">Нажми на заголовок столбца, чтобы отсортировать по возрастанию/убыванию (например по «Тип», чтобы сгруппировать официальные отдельно от товарищеских).</p>
      <div class="chart-wrap">
        <table>
          <thead><tr>${cols.map(c=>`<th data-sort="${c.key}" style="cursor:pointer;">${c.label}${matchesSortState.key===c.key?(matchesSortState.dir==='asc'?' ▲':' ▼'):''}</th>`).join('')}<th>Действия</th></tr></thead>
          <tbody>
            ${sorted.length===0 ? `<tr><td colspan="${cols.length+1}" class="empty">Пока нет матчей</td></tr>` : sorted.map(g=>{
              if(g.missed) return `<tr><td>${g.date}</td><td>${g.opponent}</td><td colspan="${cols.length-2}" class="muted">🩹 пропущено</td><td><button class="icon-btn" data-del-game="${g.id}">✕</button></td></tr>`;
              return `<tr>
                <td>${g.date}</td><td>${g.opponent}</td>
                <td><span class="pill">${g.matchType==='friendly'?'Товарищеская':'Официальная'}</span></td>
                <td><span class="pill">${g.matchRating.toFixed(1)}</span></td>
                ${['skating','dribbling','shooting','iq','battle'].map(k=>{
                  const v=g.xpGained[k]||0;
                  return `<td style="color:${v>=0?'var(--pos)':'var(--neg)'}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
                }).join('')}
                <td><button class="icon-btn" data-edit-game="${g.id}">✎</button> <button class="icon-btn" data-del-game="${g.id}">✕</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  el.querySelectorAll('[data-sort]').forEach(th=>th.onclick=()=>{
    const key = th.dataset.sort;
    if(matchesSortState.key===key) matchesSortState.dir = matchesSortState.dir==='asc'?'desc':'asc';
    else matchesSortState = {key, dir:'desc'};
    renderMatches();
  });
  el.querySelectorAll('[data-edit-game]').forEach(b=>b.onclick=()=>{
    editingGameId = b.dataset.editGame;
    document.querySelectorAll('#nav button').forEach(nb=>nb.classList.remove('active'));
    document.querySelector('#nav button[data-tab="game"]').classList.add('active');
    document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
    document.getElementById('tab-game').classList.add('active');
    renderGame();
  });
  el.querySelectorAll('[data-del-game]').forEach(b=>b.onclick=()=>{
    if(!confirm('Удалить этот матч? Рейтинги навыков будут пересчитаны, действие необратимо.')) return;
    deleteGame(b.dataset.delGame);
  });
}

function deleteGame(gameId){
  const idx = data.games.findIndex(g=>g.id===gameId);
  if(idx===-1) return;
  const g = data.games[idx];
  if(!g.missed && g.xpGained){
    Object.entries(g.xpGained).forEach(([attr,xp])=> applyXp(attr, -xp));
    if(g.hotStreakBonusAwarded) Object.keys(data.player.attributes).forEach(k=>applyXp(k, -HOT_STREAK_BONUS));
  }
  data.bonusLedger = data.bonusLedger.filter(b=> b.gameId !== gameId);
  data.games.splice(idx,1);
  recordOvrSnapshot(todayStr()); // refresh current OVR snapshot; past months' snapshots are left as historical record
  saveData();
  renderAll();
}

let teamSelectedLine = 'line1';
function renderTeam(){
  const el = document.getElementById('tab-team');

  if(teamSelectedLine==='stats'){

        agg[name].goals += s.goals; agg[name].assists += s.assists;
        agg[name].plusMinus += s.plusMinus; agg[name].penalties += s.penalties;

    const rows = Object.entries(agg).sort((a,b)=>b[1].goals-a[1].goals);

            <tbody>
              ${rows.length===0 ? `<tr><td colspan="5" class="empty">Пока нет данных — вноси статы одноклубников во вкладке «Внести игру»</td></tr>` : rows.map(([name,s])=>`

  el.innerHTML = `

      <div class="line-tabs">
        ${tabs.map(t=>`<button class="line-tab ${t.id===teamSelectedLine?'active':''}" data-line="${t.id}">${t.label}</button>`).join('')}
      </div>
      <div class="halfrink">
        <div class="halfrink-crease"></div>
        <div class="halfrink-circle" style="left:12%;"></div>
        <div class="halfrink-circle" style="left:88%;"></div>
        ${group.slots.map(s=>`
          <div class="rink-slot ${data.lineup[s.id]?'filled':''}" data-slot="${s.id}" style="top:${s.top}; left:${s.left};">
            <div class="rink-slot-pos">${s.pos}</div>
            <div class="rink-slot-name">${data.lineup[s.id] || '+'}</div>
          </div>
        `).join('')}
      </div>
    </div>

  el.querySelectorAll('[data-line]').forEach(b=>b.onclick=()=>{ teamSelectedLine = b.dataset.line; renderTeam(); });

function renderTrainingHistory(){
  const wrap = document.getElementById('training-history');
  const entries = Object.entries(data.trainingLog).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);
  if(entries.length===0){ wrap.innerHTML=''; return; }
  const rows = entries.map(([date, marks])=>{
    const parts = Object.entries(marks).map(([tid,count])=>{
      const t = data.trainingTasks.find(t=>t.id===tid);
      return t ? `${t.name} ×${count}` : '';
    }).filter(Boolean).join(', ');
    return `<li><span>${date}<br><span class="muted">${parts}</span></span><button class="icon-btn" data-del-training="${date}">✕</button></li>`;
  }).join('');
  wrap.innerHTML = `<div class="card"><h2>Последние 5 тренировок</h2><ul class="list">${rows}</ul></div>`;
  wrap.querySelectorAll('[data-del-training]').forEach(b=>b.onclick=()=>{
    const date = b.dataset.delTraining;
    const marks = data.trainingLog[date];
    Object.entries(marks).forEach(([tid,count])=>{
      const t = data.trainingTasks.find(t=>t.id===tid);
      if(t) applyXp(t.attr, -count*TRAINING_XP_PER_MARK);
    });
    delete data.trainingLog[date];
    saveData(); renderPlayer(); renderTraining();
  });
}

function renderTrainingStats(){

let tasksWeekOffset = 0; // 0 = this week, negative = past weeks, max +1 = next week
let editingTaskId = null;
function renderTasks(){
  const el = document.getElementById('tab-tasks');
  const viewedMonday = mondayStr(addDays(todayStr(), tasksWeekOffset*7));
  const weekDates = Array.from({length:7}, (_,i)=> addDays(viewedMonday, i));

  const now = new Date();
  const curMonthKey = now.toISOString().slice(0,7);
  const curYear = String(now.getFullYear());
  let monthTotal = 0, yearTotal = 0;
  Object.entries(data.taskLog).forEach(([date, entries])=>{
    const sum = Object.values(entries).filter(e=>e.status==='done').reduce((s,e)=>s+e.points,0);
    if(date.startsWith(curMonthKey)) monthTotal += sum;
    if(date.startsWith(curYear)) yearTotal += sum;
  });
  data.bonusLedger.forEach(b=>{
    if(b.date.startsWith(curMonthKey)) monthTotal += b.points;
    if(b.date.startsWith(curYear)) yearTotal += b.points;
  });

  function milestoneBlock(period, total){
    const list = data.milestones[period].slice().sort((a,b)=>a.threshold-b.threshold);
    const next = list.find(m=>total < m.threshold);
    const pct = next ? Math.min(100, total/next.threshold*100) : 100;
    return `
      <div class="progress-wrap">
        <div class="progress-label"><span>${period==='monthly'?'За месяц':'За год'}</span><span>${total} ${next?('/ '+next.threshold):''}</span></div>

      </div>
      <div class="milestone-list">
        ${list.map(m=>`<div class="m-item ${total>=m.threshold?'done':''}">

      <h2>Прогресс к наградам</h2>

      <div style="height:10px"></div>
      ${milestoneBlock('yearly', yearTotal)}

    ${parentUnlocked && pendingList.length>0 ? `

      <h2>Ожидают подтверждения</h2>
      <ul class="list" id="pending-list">
        ${pendingList.map(p=>`<li><span>${p.date} · ${p.task?p.task.name:'?'}</span>

          <button class="icon-btn" data-reject="${p.date}|${p.taskId}">✕</button></span></li>`).join('')}
      </ul>
    </div>` : ''}

    <div class="card">
      <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:4px;">
        <h2 style="margin:0;">${tasksWeekOffset===0?'Эта неделя':(tasksWeekOffset===1?'Следующая неделя':`Неделя от ${viewedMonday}`)}</h2>
        <div style="display:flex; gap:4px;">
          <button class="ghost" id="week-prev" type="button">← Раньше</button>
          <button class="ghost" id="week-next" type="button" ${tasksWeekOffset>=1?'disabled':''}>Позже →</button>

      </div>
      <div class="muted" style="font-size:11px; margin-bottom:8px;">Сегодня: ${DAY_LABELS[weekdayIndex(todayStr())]}, ${todayStr()}</div>
      <div class="week-grid" id="week-grid"></div>
    </div>

    ${parentUnlocked && (tasksWeekOffset===0 || tasksWeekOffset===1) ? `
    <div class="card">
      <h2>Список заданий — ${tasksWeekOffset===0?'эта неделя':'следующая неделя'}</h2>
      <p class="muted">Каждая неделя своя — ничего не переносится сюда автоматически. ${tasksWeekOffset===1?'Задания отсюда начнут действовать только с понедельника.':''}</p>
      ${tasksWeekOffset===1 && programForWeek(viewedMonday).length===0 && programForWeek(mondayStr(todayStr())).length>0 ? `

        <input id="task-name" placeholder="Название задания">
        <input id="task-points" type="number" min="1" placeholder="Баллы" style="max-width:90px" value="1">
        <select id="task-attr" style="max-width:170px">
          <option value="">Без навыка (только баллы)</option>
          ${Object.entries(ATTR_DEFS).map(([k,d])=>`<option value="${k}">${d.label}</option>`).join('')}
        </select>
        <input id="task-skillxp" type="number" min="0" step="0.1" placeholder="XP навыку" style="max-width:100px" value="1">
      </div>
      <div class="row" id="task-days"></div>
      <label style="display:flex; align-items:center; gap:6px; font-size:13px; margin-bottom:10px; cursor:pointer;">
        <input type="checkbox" id="task-confirm" style="width:auto; flex:none;">
        Требовать подтверждение родителя (для важных/редких заданий — не для ежедневных привычек)
      </label>
      <button class="primary" id="add-task">Добавить задание</button>
      <ul class="list" id="task-list" style="margin-top:10px;"></ul>
    </div>` : ''}
  `;

  if(parentUnlocked){
    document.querySelectorAll('[data-confirm]').forEach(b=>b.onclick=()=>{
      const [date, taskId] = b.dataset.confirm.split('|');
      data.taskLog[date][taskId].status = 'done';
      const task = findTaskById(taskId);
      if(task && task.attr) applyXp(task.attr, task.skillXp ?? TASK_XP);
      saveData(); renderTasks(); renderPlayer();
    });
    document.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>{
      const [date, taskId] = b.dataset.reject.split('|');
      delete data.taskLog[date][taskId];
      saveData(); renderTasks();
    });
  }

  if(parentUnlocked && (tasksWeekOffset===0 || tasksWeekOffset===1)){
    if(!data.weeklyPrograms[viewedMonday]) data.weeklyPrograms[viewedMonday] = [];
    const program = data.weeklyPrograms[viewedMonday];

    const copyBtn = document.getElementById('copy-week');
    if(copyBtn) copyBtn.onclick = ()=>{
      const thisWeek = programForWeek(mondayStr(todayStr()));
      data.weeklyPrograms[viewedMonday] = thisWeek.map(t=>({...t, id:uid()}));
      saveData(); renderTasks();
    };

    const daysWrap = document.getElementById('task-days');
    const selectedDays = new Set();
    DAY_LABELS.forEach((lbl,i)=>{
      const b = document.createElement('button');
      b.className='daybtn'; b.textContent=lbl; b.type='button';
      b.onclick = ()=>{ b.classList.toggle('on'); selectedDays.has(i)?selectedDays.delete(i):selectedDays.add(i); };
      daysWrap.appendChild(b);
    });
    document.getElementById('add-task').onclick = ()=>{
      const name = document.getElementById('task-name').value.trim();
      const points = parseInt(document.getElementById('task-points').value)||1;
      const attr = document.getElementById('task-attr').value || null;
      const skillXp = parseFloat(document.getElementById('task-skillxp').value);
      const confirmRequired = document.getElementById('task-confirm').checked;
      if(!name || selectedDays.size===0){ alert('Укажи название и хотя бы один день недели'); return; }
      program.push({id:uid(), name, points, attr, skillXp: isNaN(skillXp)?1:skillXp, days:[...selectedDays], confirmRequired});
      saveData(); renderTasks();
    };

    const taskList = document.getElementById('task-list');
    if(program.length===0){ taskList.innerHTML = '<li class="empty">Пока нет заданий на эту неделю</li>'; }
    program.forEach(t=>{
      const li=document.createElement('li');
      if(editingTaskId===t.id){
        li.style.display='block';
        li.innerHTML = `
          <div class="row">
            <input id="et-name" value="${t.name}" style="flex:2;">
            <input id="et-points" type="number" min="1" value="${t.points}" style="max-width:80px;">
            <select id="et-attr" style="max-width:170px">
              <option value="">Без навыка</option>
              ${Object.entries(ATTR_DEFS).map(([k,d])=>`<option value="${k}" ${t.attr===k?'selected':''}>${d.label}</option>`).join('')}
            </select>
            <input id="et-skillxp" type="number" min="0" step="0.1" value="${t.skillXp??1}" style="max-width:90px;">
          </div>
          <div class="row" id="et-days"></div>
          <div class="row">
            <button class="primary" id="et-save" type="button">Сохранить</button>
            <button class="ghost" id="et-cancel" type="button">Отмена</button>
          </div>
        `;
        taskList.appendChild(li);
        const etDaysWrap = li.querySelector('#et-days');
        const etSelectedDays = new Set(t.days);
        DAY_LABELS.forEach((lbl,i)=>{
          const b = document.createElement('button');
          b.className='daybtn'+(etSelectedDays.has(i)?' on':''); b.textContent=lbl; b.type='button';
          b.onclick = ()=>{ b.classList.toggle('on'); etSelectedDays.has(i)?etSelectedDays.delete(i):etSelectedDays.add(i); };
          etDaysWrap.appendChild(b);
        });
        li.querySelector('#et-save').onclick = ()=>{
          t.name = li.querySelector('#et-name').value.trim() || t.name;
          t.points = parseInt(li.querySelector('#et-points').value)||1;
          t.attr = li.querySelector('#et-attr').value || null;
          const sx = parseFloat(li.querySelector('#et-skillxp').value);
          t.skillXp = isNaN(sx)?1:sx;
          t.days = [...etSelectedDays];
          editingTaskId = null;
          saveData(); renderTasks();
        };
        li.querySelector('#et-cancel').onclick = ()=>{ editingTaskId=null; renderTasks(); };
      } else {
        const attrPill = t.attr ? `<span class="pill">${icon(t.attr)} ${ATTR_DEFS[t.attr].label}</span>` : '';
        const confirmPill = t.confirmRequired ? `<span class="pill">требует подтверждения</span>` : '';
        li.innerHTML = `<span>${t.name} <span class="pill">${t.points} б.</span> ${attrPill} ${confirmPill} <span class="pill">${t.days.map(d=>DAY_LABELS[d]).join(' ')}</span></span>
          <span><button class="icon-btn" data-edit-task="${t.id}">✎</button> <button class="icon-btn" data-del-task="${t.id}">✕</button></span>`;
        taskList.appendChild(li);
      }
    });
    taskList.querySelectorAll('[data-edit-task]').forEach(b=>b.onclick=()=>{ editingTaskId = b.dataset.editTask; renderTasks(); });
    taskList.querySelectorAll('[data-del-task]').forEach(b=>b.onclick=()=>{
      data.weeklyPrograms[viewedMonday] = program.filter(t=>t.id!==b.dataset.delTask);
      saveData(); renderTasks();
    });
  }

  document.getElementById('week-prev').onclick = ()=>{ tasksWeekOffset--; editingTaskId=null; renderTasks(); };
  document.getElementById('week-next').onclick = ()=>{ if(tasksWeekOffset<1) tasksWeekOffset++; editingTaskId=null; renderTasks(); };

  // week grid — always visible; source is whatever was explicitly set for the viewed week
  const grid = document.getElementById('week-grid');
  const todayIdx = weekDates.indexOf(todayStr());
  grid.innerHTML = `<div></div>` + DAY_LABELS.map((l,i)=>`<div class="hcell${i===todayIdx?' today-col':''}">${l}</div>`).join('');
  const gridTasks = programForWeek(viewedMonday);
  if(gridTasks.length===0){
    grid.innerHTML += `<div class="empty" style="grid-column:1/-1;">${parentUnlocked ? 'Пока нет заданий на эту неделю — добавь их ниже.' : 'На эту неделю пока ничего не добавлено.'}</div>`;
  }
  gridTasks.forEach(t=>{
    grid.innerHTML += `<div class="taskname">${t.attr?icon(t.attr)+' ':''}${t.name}</div>`;
    weekDates.forEach((dateStr, dayIdx)=>{
      const isToday = dayIdx===todayIdx;
      if(!t.days.includes(dayIdx)){ grid.innerHTML += `<div class="${isToday?'today-col':''}"></div>`; return; }
      const entry = data.taskLog[dateStr] && data.taskLog[dateStr][t.id];
      const cls = entry ? (entry.status==='done' ? 'on' : '') : '';
      const mark = entry ? (entry.status==='done' ? '✓' : '⏳') : '';
      const editable = parentUnlocked || dateStr===todayStr();
      grid.innerHTML += `<div class="chk ${cls} ${isToday?'today-col':''}" style="${entry && entry.status==='pending' ? 'background:var(--gold); color:var(--ice-deep); border-color:var(--gold);':''} ${editable?'':'opacity:.3; cursor:not-allowed;'}" ${editable?`data-toggle="${dateStr}|${t.id}"`:''}>${mark}</div>`;
    });
  });
  grid.querySelectorAll('[data-toggle]').forEach(c=>c.onclick=()=>{
    const [dateStr, taskId] = c.dataset.toggle.split('|');
    const task = gridTasks.find(t=>t.id===taskId);
    if(!data.taskLog[dateStr]) data.taskLog[dateStr] = {};
    const existing = data.taskLog[dateStr][taskId];
    if(existing){
      // undo — allowed for both pending (Samir can cancel his own mark) and done (only meaningful if parent unlocked, but keep simple: anyone can uncheck)
      if(existing.status==='done' && task.attr) applyXp(task.attr, -(task.skillXp ?? TASK_XP));
      delete data.taskLog[dateStr][taskId];
    } else if(task.confirmRequired){
      data.taskLog[dateStr][taskId] = {status:'pending', points: task.points};
    } else {
      data.taskLog[dateStr][taskId] = {status:'done', points: task.points};
      if(task.attr) applyXp(task.attr, task.skillXp ?? TASK_XP);
    }
    saveData(); renderTasks(); renderPlayer();
  });
}

// ================= RENDER: SETTINGS =================
function renderSettings(){
  const el = document.getElementById('tab-settings');
  if(!parentUnlocked){
    el.innerHTML = `<div class="card">
      <h2>Настройки закрыты</h2>
      <p class="muted">Здесь управление заданиями, тренировочными уровнями и наградами — доступно только родителю.</p>
      <button class="primary" id="settings-unlock">🔒 Ввести PIN</button>
    </div>`;
    document.getElementById('settings-unlock').onclick = ()=> requireParentUnlock();
    return;
  }
  el.innerHTML = `
    <div class="card">
      <h2>Имя игрока</h2>
      <div class="row"><input id="s-name" value="${data.player.name}"><button class="primary" id="s-save-name">Сохранить</button></div>
    </div>
    <div class="card">
      <h2>PIN родителя</h2>
      <div class="row"><input id="s-pin" value="${data.parentPin}" maxlength="8"><button class="primary" id="s-save-pin">Сохранить PIN</button></div>
    </div>
    <div class="card">
      <h2>Майлстоуны за месяц</h2>
      <p class="muted">Рекомендованные уровни (Голд 100 / Платина 140 / Супернова 160, посчитаны от реального потолка месяца) можно загрузить одной кнопкой вместо ручного ввода.</p>
      <button class="ghost" id="load-recommended" style="margin-bottom:10px;">Загрузить рекомендованные уровни</button>
      <div class="row">
        <input id="mm-threshold" type="number" placeholder="Порог очков" style="max-width:130px">
        <input id="mm-reward" placeholder="Награда">
        <button class="primary" id="mm-add">Добавить</button>
      </div>
      <ul class="list" id="mm-list"></ul>
    </div>
    <div class="card">
      <h2>Майлстоуны за год</h2>
      <div class="row">
        <input id="my-threshold" type="number" placeholder="Порог очков" style="max-width:130px">
        <input id="my-reward" placeholder="Награда">
        <button class="primary" id="my-add">Добавить</button>
      </div>
      <ul class="list" id="my-list"></ul>
    </div>
    <div class="card">
      <h2>Стартовые рейтинги навыков</h2>
      <p class="muted">Меняй, только если нужно скорректировать текущие значения вручную (не влияет на прошлые игры).</p>
      <div class="row" id="attr-edit"></div>
      <button class="primary" id="attr-save">Сохранить рейтинги</button>
    </div>
    <div class="card">
      <h2>Сбросить накопленный опыт (XP)</h2>
      <p class="muted">Обнуляет только зелёную полоску прогресса у всех навыков до следующего уровня — сами рейтинги не трогает. Нужно, если после старого теста где-то висит "лишний" XP.</p>
      <button class="ghost" id="reset-xp">Обнулить XP всех навыков</button>
    </div>
  `;

  document.getElementById('s-save-pin').onclick = ()=>{
    const v = document.getElementById('s-pin').value.trim();
    if(v){ data.parentPin = v; saveData(); alert('PIN обновлён.'); }
  };
  document.getElementById('s-save-name').onclick = ()=>{
    data.player.name = document.getElementById('s-name').value.trim() || 'Игрок';
    saveData(); renderAll();
  };

  function renderMilestoneList(period, listElId){
    const listEl = document.getElementById(listElId);
    listEl.innerHTML='';
    data.milestones[period].forEach(m=>{
      const li=document.createElement('li');
      li.innerHTML = `<span>${m.threshold} — ${m.reward}</span><button class="icon-btn" data-del="${m.id}">✕</button>`;
      listEl.appendChild(li);
    });
    listEl.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
      data.milestones[period] = data.milestones[period].filter(m=>m.id!==b.dataset.del);
      saveData(); renderSettings();
    });
  }
  renderMilestoneList('monthly','mm-list');
  renderMilestoneList('yearly','my-list');

  document.getElementById('load-recommended').onclick = ()=>{
    if(!confirm('Заменить текущие майлстоуны на рекомендованные (Голд 100 / Платина 140 / Супернова 160, год 1200)? Текущие записи будут удалены.')) return;
    data.milestones.monthly = RECOMMENDED_MILESTONES.monthly.map(m=>({id:uid(), ...m}));
    data.milestones.yearly = RECOMMENDED_MILESTONES.yearly.map(m=>({id:uid(), ...m}));
    saveData(); renderSettings();
  };
  document.getElementById('mm-add').onclick = ()=>{
    const threshold = parseInt(document.getElementById('mm-threshold').value);
    const reward = document.getElementById('mm-reward').value.trim();
    if(!threshold || !reward) return;
    data.milestones.monthly.push({id:uid(), threshold, reward});
    saveData(); renderSettings();
  };
  document.getElementById('my-add').onclick = ()=>{
    const threshold = parseInt(document.getElementById('my-threshold').value);
    const reward = document.getElementById('my-reward').value.trim();
    if(!threshold || !reward) return;
    data.milestones.yearly.push({id:uid(), threshold, reward});
    saveData(); renderSettings();
  };

  const attrEdit = document.getElementById('attr-edit');
  attrEdit.innerHTML = Object.entries(data.player.attributes).map(([key,a])=>`
    <div class="field"><label class="f">${icon(key)} ${ATTR_DEFS[key].label}</label>
    <input type="number" min="20" max="99" id="ae-${key}" value="${a.rating}"></div>
  `).join('');
  document.getElementById('attr-save').onclick = ()=>{
    Object.keys(data.player.attributes).forEach(key=>{
      const v = parseInt(document.getElementById('ae-'+key).value);
      if(v>=20 && v<=99){
        data.player.attributes[key].rating = v;
        data.player.attributes[key].xp = 0; // manual override = start counting fresh from this number
      }
    });
    saveData(); renderAll();
    alert('Рейтинги обновлены, буфер опыта тоже сброшен в 0.');
  };
  document.getElementById('reset-xp').onclick = ()=>{
    if(!confirm('Обнулить накопленный XP у всех навыков? Рейтинги (сами цифры) не изменятся.')) return;
    Object.values(data.player.attributes).forEach(a=> a.xp = 0);
    saveData(); renderAll();
    alert('XP всех навыков обнулён.');
  };
}

// ================= RENDER ALL =================
function renderAll(){
  const lockBtn = document.getElementById('parent-lock-btn');
  if(lockBtn) lockBtn.textContent = parentUnlocked ? '🔓 Режим родителя (вкл)' : '🔒 Режим родителя';
  const fireNum = document.getElementById('fire-number-display');
  if(fireNum) fireNum.textContent = data.player.jerseyNumber || '';
  renderPlayer();
  renderGame();
  renderMatches();
  renderTeam();
  renderTraining();
  renderTasks();
  renderSettings();
}

loadData();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(e=>console.error('SW failed', e)); });
}
</script>
